<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS home-screen icon. iOS ignores the web manifest's icons list, so
         these <link> tags are the only way it picks up an icon; 180x180 is
         the one actually used on modern iPhones, the rest cover older
         devices that still check for an exact-size match. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon-precomposed.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-touch-icon-fullbleed-57x57.png" />
    <link rel="apple-touch-icon" sizes="60x60" href="/apple-touch-icon-fullbleed-60x60.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/apple-touch-icon-fullbleed-72x72.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-touch-icon-fullbleed-76x76.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/apple-touch-icon-fullbleed-114x114.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-fullbleed-120x120.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/apple-touch-icon-fullbleed-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-fullbleed-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-fullbleed-180x180.png" />

    <!-- Apple splash screens shown while the app launches from the home
         screen, keyed by exact device logical size + pixel ratio. -->
    <link rel="apple-touch-startup-image" href="/apple-splash-1179x2556.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-750x1334.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#558cb9" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ligand" />
    <meta name="description" content="Focus, habits, and goals - designed for ADHD" />
    <title>Ligand</title>
    <!-- Dark base color painted before React (and CSS) load, so returning to
         the app or launching it from the home screen never flashes white. -->
    <style>html { background-color: #15161a; }</style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&family=Caveat:wght@500;600&family=Dancing+Script:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
