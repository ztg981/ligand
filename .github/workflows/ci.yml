name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build-audit:
    name: Test, build, audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Setup Node
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and security regression tests
        run: npm test

      - name: Verify security headers
        run: npm run security:headers

      - name: Build production bundle
        run: npm run build

      - name: Scan repository and bundle for privileged secrets
        run: npm run security:scan

      - name: Audit high and critical dependency advisories
        run: npm audit --audit-level=high

  dependency-review:
    name: Dependency review
    # Private repositories require GitHub Advanced Security for this action.
    # npm audit remains enforced above when that service is unavailable.
    if: ${{ github.event_name == 'pull_request' && github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        # actions/checkout v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Dependency review
        # actions/dependency-review-action v5.0.0
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
